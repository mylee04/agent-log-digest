name: Publish npm

on:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Use npm with trusted publishing support
        run: npm install -g npm@^11.5.1

      - name: Install
        run: npm ci

      - name: Verify
        run: |
          npm run typecheck
          npm test
          npm run build
          npm pack --dry-run

      - name: Publish
        run: npm publish
